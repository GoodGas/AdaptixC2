name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Server + Extenders (Linux only - Go plugin system requires Linux)
  # ═══════════════════════════════════════════════════════════════
  server:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install cross-compilers for beacon agent
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 \
            gcc-mingw-w64-i686 g++-mingw-w64-i686 \
            make

      - name: Build AdaptixServer
        working-directory: AdaptixServer
        env:
          GOEXPERIMENT: jsonv2,greenteagc
          CGO_ENABLED: 1
        run: |
          go build -buildvcs=false -ldflags="-s -w" -o adaptixserver .

      - name: Build all extenders
        working-directory: AdaptixServer/extenders
        env:
          GOEXPERIMENT: jsonv2,greenteagc
        run: |
          for dir in */; do
            if [ -f "${dir}Makefile" ]; then
              echo "[*] Building extender: ${dir%/}"
              (cd "$dir" && make all)
            fi
          done

      - name: Package server with extenders
        working-directory: AdaptixServer
        run: |
          mkdir -p release/adaptix-server/extenders
          cp adaptixserver release/adaptix-server/
          cp profile.yaml release/adaptix-server/
          cp ssl_gen.sh release/adaptix-server/
          cp 404page.html release/adaptix-server/

          for dir in extenders/*/; do
            plugin_name=$(basename "$dir")
            if [ -d "${dir}dist" ]; then
              cp -r "${dir}dist" "release/adaptix-server/extenders/${plugin_name}"
            fi
          done

          cd release
          tar -czf adaptix-server-linux-amd64.tar.gz adaptix-server/

      - uses: actions/upload-artifact@v4
        with:
          name: server-linux
          path: AdaptixServer/release/adaptix-server-linux-amd64.tar.gz

  # ═══════════════════════════════════════════════════════════════
  # Client - Linux (AppImage)
  # ═══════════════════════════════════════════════════════════════
  client-linux:
    runs-on: ubuntu-22.04
    env:
      QT_VERSION: '6.9.2'
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ cmake ninja-build \
            libssl-dev libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-shape0 libxcb-xkb1 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-randr0 libxcb-image0 \
            libgl1-mesa-dev libglib2.0-0 libfuse2 \
            wget python3 python3-pip file patchelf

      - name: Install Qt via aqtinstall
        run: |
          pip3 install aqtinstall
          aqt install-qt linux desktop ${QT_VERSION} linux_gcc_64 \
            -m qtwebsockets qtnetworkauth \
            -O /opt/qt

      - name: Install linuxdeployqt and appimagetool
        run: |
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage \
            -O /usr/local/bin/linuxdeployqt
          chmod +x /usr/local/bin/linuxdeployqt
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Remove unwanted SQL plugins
        run: |
          cd /opt/qt/${QT_VERSION}/gcc_64/plugins/sqldrivers
          rm -f libqsqlmimer.so* libqsqlmysql.so* libqsqlpsql.so* libqsqlodbc.so* 2>/dev/null || true
          cd /opt/qt/${QT_VERSION}/gcc_64/lib/cmake/Qt6Sql
          rm -f Qt6QMYSQLDriverPlugin*.cmake Qt6QPSQLDriverPlugin*.cmake \
                Qt6QODBCDriverPlugin*.cmake Qt6QMimerSQLDriverPlugin*.cmake 2>/dev/null || true
          sed -i 's/QMYSQLDriverPlugin//g; s/QPSQLDriverPlugin//g; s/QODBCDriverPlugin//g; s/QMimerSQLDriverPlugin//g' \
            /opt/qt/${QT_VERSION}/gcc_64/lib/cmake/Qt6Sql/Qt6SqlPlugins.cmake 2>/dev/null || true

      - name: Build client
        working-directory: AdaptixClient
        env:
          CMAKE_PREFIX_PATH: /opt/qt/${{ env.QT_VERSION }}/gcc_64
          LD_LIBRARY_PATH: /opt/qt/${{ env.QT_VERSION }}/gcc_64/lib
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/opt/qt/${QT_VERSION}/gcc_64 \
            -G Ninja
          cmake --build build -j$(nproc)

      - name: Create AppImage
        working-directory: AdaptixClient
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp build/AdaptixClient AppDir/usr/bin/
          cp Resources/Logo.png AppDir/usr/share/icons/hicolor/256x256/apps/AdaptixClient.png

          cat > AppDir/usr/share/applications/AdaptixClient.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Adaptix Client
          Exec=AdaptixClient
          Icon=AdaptixClient
          Categories=Network;Security;
          Terminal=false
          EOF

          ln -sf usr/bin/AdaptixClient AppDir/AppRun
          ln -sf usr/share/icons/hicolor/256x256/apps/AdaptixClient.png AppDir/AdaptixClient.png
          ln -sf usr/share/applications/AdaptixClient.desktop AppDir/AdaptixClient.desktop

          export PATH="/opt/qt/${QT_VERSION}/gcc_64/bin:$PATH"
          export LD_LIBRARY_PATH="/opt/qt/${QT_VERSION}/gcc_64/lib"

          /usr/local/bin/linuxdeployqt --appimage-extract
          ./squashfs-root/AppRun AppDir/usr/share/applications/AdaptixClient.desktop \
            -bundle-non-qt-libs -no-translations
          rm -rf squashfs-root

          /usr/local/bin/appimagetool --appimage-extract
          ARCH=x86_64 ./squashfs-root/AppRun AppDir AdaptixClient-x86_64.AppImage
          rm -rf squashfs-root

      - uses: actions/upload-artifact@v4
        with:
          name: client-linux
          path: AdaptixClient/AdaptixClient-x86_64.AppImage

  # ═══════════════════════════════════════════════════════════════
  # Client - Windows (MSYS2 + MinGW + Qt6)
  # ═══════════════════════════════════════════════════════════════
  client-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6
            mingw-w64-x86_64-openssl

      - name: Build client
        working-directory: AdaptixClient
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQt6_DIR="${MINGW_PREFIX}/lib/cmake"
          cmake --build build --config Release

      - name: Package with windeployqt
        working-directory: AdaptixClient
        run: |
          mkdir -p dist
          cp build/AdaptixClient.exe dist/
          cd dist
          windeployqt.exe AdaptixClient.exe

          # Copy MinGW runtime DLLs
          for dll in libwinpthread-1.dll libgcc_s_seh-1.dll libstdc++-6.dll \
                     libfreetype-6.dll libharfbuzz-0.dll libpng16-16.dll \
                     zlib1.dll libb2-1.dll libdouble-conversion.dll \
                     libpcre2-16-0.dll libbrotlidec.dll libzstd.dll \
                     libbz2-1.dll libglib-2.0-0.dll libgraphite2.dll \
                     libbrotlicommon.dll libpcre2-8-0.dll libintl-8.dll \
                     libiconv-2.dll libmd4c.dll; do
            cp "${MINGW_PREFIX}/bin/${dll}" . 2>/dev/null || true
          done

          # Copy ICU DLLs (version-agnostic)
          cp ${MINGW_PREFIX}/bin/libicuin*.dll . 2>/dev/null || true
          cp ${MINGW_PREFIX}/bin/libicuuc*.dll . 2>/dev/null || true
          cp ${MINGW_PREFIX}/bin/libicudt*.dll . 2>/dev/null || true

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path "AdaptixClient/dist/*" -DestinationPath "AdaptixClient-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: AdaptixClient-windows-x64.zip

  # ═══════════════════════════════════════════════════════════════
  # Create GitHub Release
  # ═════════════════════���═════════════════════════════════════════
  release:
    needs: [server, client-linux, client-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/server-linux/adaptix-server-linux-amd64.tar.gz
            artifacts/client-linux/AdaptixClient-x86_64.AppImage
            artifacts/client-windows/AdaptixClient-windows-x64.zip
